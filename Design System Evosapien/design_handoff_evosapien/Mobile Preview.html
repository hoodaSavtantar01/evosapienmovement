<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mobile Preview — Evosapien Movement</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Onest', sans-serif;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .topbar-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .topbar-sub {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); font-weight: 300;
  }
  .size-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border: 1px solid rgba(255,255,255,0.12); border-radius: 9999px;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.45);
  }

  /* Scroll track */
  .scroll-track {
    display: flex; gap: 48px; align-items: flex-start;
    padding: 56px 40px 80px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-track::-webkit-scrollbar { height: 2px; }
  .scroll-track::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
  .scroll-track::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  /* Phone frame */
  .phone-wrap {
    flex: none;
    scroll-snap-align: start;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .phone-label {
    font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); font-weight: 400; text-align: center;
  }
  .phone-label strong {
    display: block; font-size: 13px; letter-spacing: 0.1em; font-weight: 700;
    color: rgba(255,255,255,0.7); margin-bottom: 4px;
  }

  /* The iPhone shell */
  .phone-shell {
    width: 390px;
    background: #111;
    border-radius: 54px;
    padding: 16px;
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.12),
      0 0 0 2.5px rgba(0,0,0,0.9),
      0 40px 100px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6);
    position: relative;
  }

  /* Side buttons */
  .phone-shell::before {
    content: '';
    position: absolute; left: -3px; top: 120px;
    width: 3px; height: 36px;
    background: rgba(255,255,255,0.15); border-radius: 2px 0 0 2px;
    box-shadow: 0 48px 0 rgba(255,255,255,0.15), 0 90px 0 rgba(255,255,255,0.15);
  }
  .phone-shell::after {
    content: '';
    position: absolute; right: -3px; top: 160px;
    width: 3px; height: 72px;
    background: rgba(255,255,255,0.15); border-radius: 0 2px 2px 0;
  }

  /* Screen bezel */
  .phone-screen {
    background: #000;
    border-radius: 42px;
    overflow: hidden;
    position: relative;
    height: 780px;
    display: flex; flex-direction: column;
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 20px;
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
  }

  /* Status bar */
  .status-bar {
    height: 54px; flex-shrink: 0;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
    color: #fff; position: relative; z-index: 5;
    background: transparent;
  }
  .status-time { font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { opacity: 0.9; }

  /* iframe container */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .phone-iframe {
    position: absolute;
    top: 0; left: 0;
    width: 390px;
    height: 100%;
    border: none;
    transform-origin: top left;
    pointer-events: auto;
  }

  /* Home indicator */
  .home-indicator {
    height: 28px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  .home-bar {
    width: 130px; height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }
</style>
</head>
